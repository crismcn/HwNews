name: Scrape Website

on:
  workflow_dispatch: # 手动触发
  schedule:
    - cron: '09 23 * * *' # 每6小时执行一次（UTC）

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖
        run: npm install

      - name: 安装 Playwright 浏览器
        run: npx playwright install --with-deps

      - name: 运行脚本
        run: node scrape.js

      - name: 提交变更到仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add *.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新新闻数据 [$(date +'%Y-%m-%d %H:%M')]" && git push)
