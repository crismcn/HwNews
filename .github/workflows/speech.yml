name: Scrape Website

on:
  workflow_dispatch:
  schedule:
    - cron: '7 20 * * *' # 每天04:07
jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖
        run: npm install

      - name: 运行脚本
        env:
          WECHAT_OPENID: ${{ secrets.WECHAT_OPENID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node speech.js

      - name: 提交变更到仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add *.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新新闻数据 [$(date +'%Y-%m-%d %H:%M')]" && git push)
